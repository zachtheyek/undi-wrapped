name: Deploy to GitHub Pages

# Builds the site from the live MECo foundation (zachtheyek/meco-data). Runs on every
# push, AND weekly. On the weekly run it FIRST checks whether the MECo data actually
# changed since the last deploy — if not, it does nothing. public/data is generated
# here; logos & boundaries stay committed. So the site self-updates when data refreshes.
on:
  push:
    branches: [main]
  schedule:
    - cron: "37 20 * * 0"   # Sundays 20:37 UTC, just after meco-data's auto-refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changed:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.c.outputs.go }}
      meco_sha: ${{ steps.c.outputs.meco_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: zachtheyek/meco-data
          path: meco-data
      - id: c
        run: |
          MECO_SHA=$(git -C meco-data rev-parse HEAD)
          echo "meco_sha=$MECO_SHA" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"; echo "non-schedule run -> build"; exit 0
          fi
          LIVE=$(curl -fsS https://zachtheyek.github.io/undi-wrapped/data-version.txt 2>/dev/null | tr -d '[:space:]' || echo none)
          if [ "$MECO_SHA" = "$LIVE" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"; echo "MECo data unchanged ($MECO_SHA) -> skip"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"; echo "MECo data changed ($LIVE -> $MECO_SHA) -> build"
          fi

  build:
    needs: changed
    if: needs.changed.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: undi-wrapped
      - uses: actions/checkout@v4
        with:
          repository: zachtheyek/meco-data   # the shared data foundation (public)
          path: meco-data
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas pyarrow
      - name: Generate data from MECo foundation
        run: python scripts/build_data.py     # reads ../meco-data/out -> writes public/data
        working-directory: undi-wrapped
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: undi-wrapped/package-lock.json
      - run: npm ci
        working-directory: undi-wrapped
      - run: npm run build
        working-directory: undi-wrapped
        env:
          SITE_URL: https://zachtheyek.github.io/undi-wrapped
      - name: Stamp the data version
        run: echo "${{ needs.changed.outputs.meco_sha }}" > undi-wrapped/dist/data-version.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: undi-wrapped/dist

  deploy:
    needs: [changed, build]
    if: needs.changed.outputs.go == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
